apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-green
  namespace: roboshop
  labels:
    purpose: blue-green
    project: roboshop
    color: green
spec:
  replicas: 2
  selector:
    matchLabels:
      purpose: blue-green
      project: roboshop
      color: green
  template:
    metadata:
      labels:
        purpose: blue-green
        project: roboshop
        color: green
    spec:
      containers:
      - name: catalogue
        image: robotshop/rs-catalogue:v2   # new version under test
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
