apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-green
  labels:
    purpose: blue-green
    project: sample
    color: green
spec:
  replicas: 2
  selector:
    matchLabels:
      purpose: blue-green
      project: sample
      color: green
  template:
    metadata:
      labels:
        purpose: blue-green
        project: sample
        color: green
    spec:
      containers:
      - name: sample
        image: joindevops/sample:v2
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
