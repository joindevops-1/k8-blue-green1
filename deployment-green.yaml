apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-green
  namespace: roboshop
  labels:
    app: catalogue
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalogue
      version: green
  template:
    metadata:
      labels:
        app: catalogue
        version: green
    spec:
      containers:
      - name: catalogue
        image: robotshop/rs-catalogue:v2   # new version to test
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_URL
          value: "mongodb://mongodb:27017/catalogue"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
